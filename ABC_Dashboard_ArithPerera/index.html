<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABC Logistics - Command Center</title>
    <!-- Using Tailwind CSS for a clean, modern aesthetic -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Using Chart.js for data visualization (Phase 2) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* Custom brand colors for ABC Logistics */
        :root {
            --brand-primary: #1e3a8a; /* Deep Blue */
            --brand-secondary: #f3f4f6; /* Light Gray */
        }
        body {
            background-color: var(--brand-secondary);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Navigation Bar -->
    <nav class="bg-blue-900 text-white shadow-md">
        <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="text-xl font-bold tracking-wide">
                📦 ABC Logistics
            </div>
            <div class="space-x-4">
                <a href="index.html" class="hover:text-blue-300 font-semibold transition-colors">Dashboard</a>
                <!-- Link to the future developer profile (Phase 6) -->
                <a href="about.html" class="hover:text-blue-300 transition-colors">Developer Profile</a>
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main class="flex-grow max-w-6xl mx-auto px-4 py-8 w-full grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <!-- Input Form Section (Left Column) -->
        <div class="bg-white p-6 rounded-lg shadow-md h-fit">
            <h2 class="text-2xl font-bold text-gray-800 mb-4">Add Inventory</h2>
            <form id="inventoryForm" class="space-y-4">
                <div>
                    <label for="itemName" class="block text-sm font-medium text-gray-700 mb-1">Item Name</label>
                    <input type="text" id="itemName" required placeholder="e.g., Cardboard Boxes" 
                        class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div>
                    <label for="itemQuantity" class="block text-sm font-medium text-gray-700 mb-1">Quantity</label>
                    <input type="number" id="itemQuantity" required min="0" placeholder="e.g., 150" 
                        class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
                </div>
                
                <!-- Error Message Container (Phase 5) -->
                <div id="formError" class="hidden text-sm text-red-600 bg-red-50 p-3 rounded-md border border-red-200">
                </div>

                <button type="submit" 
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded transition-colors">
                    Add Item
                </button>
            </form>
        </div>

        <!-- Inventory List Section (Right Column) -->
        <div class="md:col-span-2 bg-white p-6 rounded-lg shadow-md">
            
            <!-- Chart.js Visualization Canvas (Phase 2 - Moved to Top) -->
            <div class="mb-8 border-b border-gray-200 pb-6">
                <h3 class="text-lg font-bold text-gray-800 mb-4">Stock Levels Visualization</h3>
                <div class="w-full mx-auto" style="position: relative; height:40vh; width:100%">
                    <canvas id="inventoryChart"></canvas>
                </div>
            </div>

            <div class="flex justify-between items-center mb-4">
                <h2 class="text-2xl font-bold text-gray-800">Current Inventory</h2>
                <button id="clearAllBtn" class="bg-red-500 hover:bg-red-600 text-white font-bold py-1 px-3 rounded text-sm transition-colors">
                    Clear All
                </button>
            </div>
            
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Item Name</th>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Quantity</th>
                        </tr>
                    </thead>
                    <tbody id="inventoryTableBody" class="bg-white divide-y divide-gray-200">
                        <!-- Inventory rows will be injected here by JavaScript -->
                    </tbody>
                </table>
            </div>
            
            <!-- Empty state message -->
            <div id="emptyState" class="text-center py-8 text-gray-500 hidden">
                No items in inventory. Add an item to get started!
            </div>
        </div>

    </main>

    <!-- Footer -->
    <footer class="bg-gray-800 text-gray-300 py-4 text-center text-sm">
        &copy; <span id="year"></span> ABC Logistics Command Center. Built with AI.
    </footer>

    <!-- Application Logic -->
    <script>
        // Set current year in footer
        document.getElementById('year').textContent = new Date().getFullYear();

        // DOM Elements
        const form = document.getElementById('inventoryForm');
        const itemNameInput = document.getElementById('itemName');
        const itemQuantityInput = document.getElementById('itemQuantity');
        const tableBody = document.getElementById('inventoryTableBody');
        const emptyState = document.getElementById('emptyState');
        const clearAllBtn = document.getElementById('clearAllBtn');
        const formError = document.getElementById('formError'); // Phase 5 Error Container
        
        // Chart.js instance variable
        let inventoryChart = null;

        // Initialize state from localStorage defensively
        let inventory = [];
        try {
            const savedInventory = localStorage.getItem('abc_inventory');
            if (savedInventory) {
                inventory = JSON.parse(savedInventory);
            }
        } catch (error) {
            console.warn("Local storage is restricted in this environment.", error);
        }

        // Function to render the inventory to the table
        function renderInventory() {
            // Clear current table contents
            tableBody.innerHTML = '';

            if (inventory.length === 0) {
                // Show empty state if no items
                emptyState.classList.remove('hidden');
                tableBody.parentElement.classList.add('hidden');
            } else {
                // Hide empty state and show table
                emptyState.classList.add('hidden');
                tableBody.parentElement.classList.remove('hidden');

                // Loop through inventory and create rows
                inventory.forEach(item => {
                    const row = document.createElement('tr');
                    
                    const nameCell = document.createElement('td');
                    nameCell.className = 'px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900';
                    nameCell.textContent = item.name;

                    const quantityCell = document.createElement('td');
                    quantityCell.className = 'px-6 py-4 whitespace-nowrap text-sm text-gray-500';
                    quantityCell.textContent = item.quantity;

                    row.appendChild(nameCell);
                    row.appendChild(quantityCell);
                    tableBody.appendChild(row);
                });
            }
            
            // Update the visualization every time we render (Phase 2)
            updateChart();
        }

        // Function to render and update the Chart.js visualization
        function updateChart() {
            const ctx = document.getElementById('inventoryChart').getContext('2d');
            
            // Extract labels (names) and data (quantities) from our inventory array
            const labels = inventory.map(item => item.name);
            const data = inventory.map(item => item.quantity);

            // Phase 3: The Alarm (Option B) - Dynamic Colors
            const bgColors = data.map(quantity => 
                quantity < 10 ? 'rgba(239, 68, 68, 0.8)' : 'rgba(30, 58, 138, 0.7)' // Red if < 10, Blue otherwise
            );
            const borderColors = data.map(quantity => 
                quantity < 10 ? 'rgba(220, 38, 38, 1)' : 'rgba(30, 58, 138, 1)'
            );

            if (inventoryChart) {
                // Update existing chart to avoid destroying/recreating on every add
                inventoryChart.data.labels = labels;
                inventoryChart.data.datasets[0].data = data;
                inventoryChart.data.datasets[0].backgroundColor = bgColors; // Apply dynamic background colors
                inventoryChart.data.datasets[0].borderColor = borderColors; // Apply dynamic border colors
                inventoryChart.update();
            } else {
                // Create brand new chart instance on first load
                inventoryChart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Quantity in Stock',
                            data: data,
                            backgroundColor: bgColors, // Apply dynamic background colors
                            borderColor: borderColors, // Apply dynamic border colors
                            borderWidth: 1,
                            borderRadius: 4
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                display: false // Hide legend for cleaner look, title is self-explanatory
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                ticks: { stepSize: 1 } // Ensure whole numbers for inventory
                            }
                        }
                    }
                });
            }
        }

        // Handle form submission
        form.addEventListener('submit', function(e) {
            e.preventDefault(); // Prevent page reload

            // Phase 5: Reset error message state on each submission attempt
            formError.classList.add('hidden');
            formError.textContent = '';

            // Get values from inputs
            const name = itemNameInput.value.trim();
            const quantity = parseInt(itemQuantityInput.value, 10);

            // Phase 5: Correctness Validation
            
            // 1. Check for valid, non-negative numbers
            if (isNaN(quantity) || quantity < 0) {
                formError.textContent = "Error: Quantity must be a valid, non-negative number.";
                formError.classList.remove('hidden');
                return; // Stop execution
            }

            // 2. Check for duplicate items (case-insensitive search)
            const isDuplicate = inventory.some(item => item.name.toLowerCase() === name.toLowerCase());
            if (isDuplicate) {
                formError.textContent = `Error: The item "${name}" already exists in the inventory.`;
                formError.classList.remove('hidden');
                return; // Stop execution
            }

            // If we make it here, validation passed!
            if (name) {
                
                // Add new item to our array
                inventory.push({ name: name, quantity: quantity });
                
                // Save updated array to localStorage safely
                try {
                    localStorage.setItem('abc_inventory', JSON.stringify(inventory));
                } catch (error) {
                    console.warn("Could not save to localStorage in this preview sandbox.", error);
                }
                
                // Re-render the table
                renderInventory();
                
                // Clear the form fields and focus back on the name input
                form.reset();
                itemNameInput.focus();
            }
        });

        // Handle Clear All button click (Phase 4)
        clearAllBtn.addEventListener('click', function() {
            // 1. Empty the array in memory
            inventory = [];
            
            // 2. Remove the saved data from local storage safely
            try {
                localStorage.removeItem('abc_inventory');
            } catch (error) {
                console.warn("Could not access localStorage in this preview sandbox.", error);
            }
            
            // 3. Re-render the UI (this will show the empty state and clear the chart)
            renderInventory();
        });

        // Initial render when the page loads
        renderInventory();
    </script>
</body>
</html>
